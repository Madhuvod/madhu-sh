{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time class="post-date">{{ .Date.Format "January 2, 2006" }}</time>
  </header>

  {{ with .Params.cover }}
  <div class="book-cover">
    {{ with $.Params.link }}
    <a href="{{ . }}" target="_blank" rel="noopener">
      <img src="{{ $.Params.cover | relURL }}" alt="{{ $.Title }} cover">
    </a>
    {{ else }}
    <img src="{{ . | relURL }}" alt="{{ $.Title }} cover">
    {{ end }}
  </div>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
